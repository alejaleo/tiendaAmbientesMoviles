
<ion-card>
  <ion-card-header>
    <ion-card-title>Perfil</ion-card-title>
  </ion-card-header>

  <ion-card-content>
    <div style="text-align:center; margin-bottom: var(--space-4);">
      <img class="avatar" [src]="imagen">
    </div>

    <ion-list>
      <ion-item>
        <ion-label slot="start">Nombre</ion-label>
        <ion-label slot="end">{{ nombre }}</ion-label>
      </ion-item>
      <ion-item>
        <ion-label slot="start">Email</ion-label>
        <ion-label slot="end">{{ email }}</ion-label>
      </ion-item>
      <ion-item>
        <ion-label slot="start">Teléfono</ion-label>
        <ion-label slot="end">{{ telefono }}</ion-label>
      </ion-item>
      <ion-item lines="none">
        <ion-label slot="start">Dirección</ion-label>
        <ion-label slot="end">{{ direccion }}</ion-label>
      </ion-item>
    </ion-list>
  </ion-card-content>
</ion-card>
