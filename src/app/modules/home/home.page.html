<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Kuromi Store</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="page-content">

    <div class="greeting">
      <p class="greeting__sub">Hola, {{ nombre }} 👋</p>
      <h1 class="greeting__title">¿Qué quieres comprar hoy?</h1>
    </div>

    <div class="promo-banner">
      <div class="promo-banner__text">
        <p class="promo-banner__tag">Oferta especial</p>
        <p class="promo-banner__title">Hasta 40% OFF</p>
        <p class="promo-banner__sub">En productos seleccionados</p>
      </div>
      <div class="promo-banner__emoji">🛍️</div>
    </div>

    <div class="info-cards">
      <div class="info-card" *ngFor="let o of infoCards">
        <div class="info-card__icono" [style.background]="o.colorBg">
          <span>{{ o.icono }}</span>
        </div>
        <div class="info-card__texto">
          <p class="info-card__titulo">{{ o.titulo }}</p>
          <p class="info-card__sub">{{ o.sub }}</p>
        </div>
      </div>
    </div>

    <ion-button expand="block" [routerLink]="['/market']" class="btn-comprar">
      Ver productos y comprar
    </ion-button>

  </div>
</ion-content>
