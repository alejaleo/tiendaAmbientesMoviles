<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Productos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="page-content">
    <app-crear-producto (productoCreado)="recibirProductoCreado($event)"></app-crear-producto>
    @if (productsPage.length > 0) {
      <app-lista-producto [listaProductos]="productsPage" [mostrarEliminar]="true" (productoEliminado)="deleteProduct($event)"></app-lista-producto>
    }
  </div>
</ion-content>
